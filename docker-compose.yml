version: '3.8'
services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://appuser:password@db:5432/appdb
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  db_data:

# Примечание:
# - Этот compose-файл поднимает PostgreSQL и backend-сервис.
# - Backend по умолчанию использует переменную окружения DATABASE_URL; код backend пока содержит
#   in-memory-резервный режим, чтобы демо работало даже без БД. Для полноценной интеграции —
#   расширить backend и подключить SQLAlchemy/алембик/миграции (Epic: устранение блокера с БД).

